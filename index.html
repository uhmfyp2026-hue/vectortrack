<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>VectorTrack — Professional Distance Tracker</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Main stylesheet -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Meta tags for mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00f0ff">
    <meta name="format-detection" content="telephone=no">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300f0ff'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%23000000'/%3E%3C/svg%3E">
</head>
<body>
    <!-- Background noise layer -->
    <div class="noise"></div>
    
    <!-- SVG Gradients -->
    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00f0ff"/>
                <stop offset="50%" stop-color="#a3e635"/>
                <stop offset="100%" stop-color="#ff2d75"/>
            </linearGradient>
        </defs>
    </svg>
    
    <!-- Main App Container -->
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="17" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 2"/>
                    <circle cx="20" cy="20" r="11" stroke="currentColor" stroke-width="0.8" stroke-dasharray="3 2"/>
                    <path d="M20 5 L20 20 L30 30" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="20" cy="20" r="3" fill="currentColor"/>
                </svg>
                VectorTrack
            </div>
            <div class="badge">
                <span class="badge-dot"></span>
                LIVE
            </div>
        </header>
        
        <!-- Main Content -->
        <main class="main">
            <!-- Hero Distance Display -->
            <div class="hero">
                <span class="corner corner-tl"></span>
                <span class="corner corner-tr"></span>
                <span class="corner corner-bl"></span>
                <span class="corner corner-br"></span>
                
                <div class="hero-label">Total Distance</div>
                
                <div class="distance-display">
                    <span id="distanceValue">0.00</span>
                    <span class="unit" id="unitLabel">m</span>
                </div>
                
                <div class="speed-display" id="speedDisplay">0.0 km/h</div>
                <div class="status-line" id="status">Ready to track</div>
            </div>
            
            <!-- Ring Gauge -->
            <div class="ring-container">
                <svg class="ring" viewBox="0 0 200 200">
                    <circle class="ring-bg" cx="100" cy="100" r="85"/>
                    <circle class="ring-fill" id="ringFill" cx="100" cy="100" r="85" 
                            stroke-dasharray="534" stroke-dashoffset="534"/>
                </svg>
                
                <div class="ring-inner">
                    <div class="pulse-dot" id="pulseDot"></div>
                    <span class="ring-label" id="ringLabel">READY</span>
                </div>
            </div>
            
            <!-- Map Container -->
            <div id="map-container">
                <div id="map"></div>
            </div>
            
            <!-- Stats Row -->
            <div class="stats-row">
                <div class="stat">
                    <div class="stat-label">Origin</div>
                    <div class="stat-value" id="startCoords">—</div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <div class="stat-label">Current</div>
                    <div class="stat-value" id="endCoords">—</div>
                </div>
            </div>
            
            <!-- Speed Stats -->
            <div class="speed-stats">
                <div class="stat">
                    <div class="stat-label">Current Speed</div>
                    <div class="stat-value" id="currentSpeed">0.0 km/h</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Max Speed</div>
                    <div class="stat-value" id="maxSpeed">0.0 km/h</div>
                </div>
            </div>
            
            <!-- Controls -->
            <div class="controls">
                <button class="btn btn-start" id="startBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5,3 19,12 5,21"/>
                    </svg>
                    <span>Start</span>
                </button>
                
                <button class="btn btn-stop" id="stopBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <rect x="4" y="4" width="16" height="16" rx="2"/>
                    </svg>
                    <span>Stop</span>
                </button>
                
                <button class="btn btn-reset" id="resetBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 9-9" stroke="currentColor"/>
                        <path d="M3 3v5h5" stroke="currentColor"/>
                    </svg>
                    <span>Reset</span>
                </button>
            </div>
            
            <!-- Trips Section -->
            <div class="trips-section">
                <div class="trips-header">
                    <span>Recent Trips</span>
                    <span id="tripsCount">0 trips</span>
                </div>
                <div class="trips-body" id="tripsBody">
                    <div class="trips-empty">
                        No trips recorded yet. Press Start to begin.
                    </div>
                </div>
            </div>
            
            <!-- Log Section -->
            <div class="log-section">
                <div class="log-header">
                    <span>Activity Log</span>
                    <span id="logCount">0 events</span>
                </div>
                <div class="log-body" id="logBody">
                    <div class="log-empty">
                        No events recorded yet.
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Leaflet Script -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
