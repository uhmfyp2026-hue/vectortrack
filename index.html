

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VectorTrack — Distance Tracker</title>

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="noise"></div>

<div class="app">

<header class="header">

<div class="logo">

<svg class="logo-icon" viewBox="0 0 40 40" fill="none">
<circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.5"/>
<path d="M20 8 L20 20 L28 28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
<circle cx="20" cy="20" r="3" fill="currentColor"/>
</svg>

VectorTrack

</div>

<div class="badge">GPS Active</div>

</header>

<main class="main">

<div class="hero">

<p class="hero-label">TOTAL DISTANCE</p>

<div class="distance-display">
<span id="distanceValue">0.00</span>
<span class="unit" id="unitLabel">m</span>
</div>

<p class="status-line" id="status">Awaiting signal lock...</p>

</div>

<div class="ring-container">

<svg class="ring" viewBox="0 0 200 200">

<circle class="ring-bg" cx="100" cy="100" r="85"/>

<circle class="ring-fill" id="ringFill"
cx="100"
cy="100"
r="85"
stroke-dasharray="534"
stroke-dashoffset="534"/>

</svg>

<div class="ring-inner">

<div class="pulse-dot" id="pulseDot"></div>

<span class="ring-label" id="ringLabel">READY</span>

</div>

</div>

<div class="stats-row">

<div class="stat">
<span class="stat-label">START</span>
<span class="stat-value" id="startCoords">—</span>
</div>

<div class="stat-divider"></div>

<div class="stat">
<span class="stat-label">END</span>
<span class="stat-value" id="endCoords">—</span>
</div>

</div>

<div class="controls">

<div id="map" style="height:300px;margin-top:20px;border-radius:12px;"></div>

<button class="btn btn-start" id="startBtn">Start</button>

<button class="btn btn-stop" id="stopBtn" disabled>Stop</button>

<button class="btn btn-reset" id="resetBtn">Reset</button>

</div>

<div id="map" style="height:300px;margin-top:20px;border-radius:12px;"></div>

<div class="log-section">

<div class="log-header">

<span>SESSION LOG</span>

<span id="logCount">0 events</span>

</div>

<div class="log-body" id="logBody">

<div class="log-empty">No events recorded yet.</div>

</div>

</div>

</main>

</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA8CsiN8qmaYA_-ddnhq-eusbAdbuKaTwk"></script>

<script src="script.js"></script>

</body>
</html>
